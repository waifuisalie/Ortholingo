      - { el: "βιοτικὴν",      tl: "viotikín" }
      - { el: "ἀποθώμεθα",     tl: "apothómetha" }
      - { el: "μέριμναν,",     tl: "mérimnan," }
      - { el: "ὡς",            tl: "os" }
