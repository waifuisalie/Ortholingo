unit:
  id: unit5-grande-entrada
  title: "A Grande Entrada"
  section: fieis
  order: 5
  intro_pt: >-
    O momento em que os dons — o pão e o vinho — são levados em procissão até
    o altar. O povo canta o Hino Querubínico, e o sacerdote, diante da porta
    do iconostásio, recorda a todos no Reino. Muitos se persignam. Aqui você
    aprende a cantar com o coro e a reconhecer o que o sacerdote proclama.

items:
  - id: cherubikon
    kind: phrase
    greek: "Οἱ τὰ Χερουβεὶμ μυστικῶς εἰκονίζοντες καὶ τῇ ζωοποιῷ Τριάδι τὸν τρισάγιον ὕμνον προσᾴδοντες, πᾶσαν νῦν βιοτικὴν ἀποθώμεθα μέριμναν, ὡς τὸν βασιλέα τῶν ὅλων ὑποδεξόμενοι."
    tts: "Οι τα Χερουβείμ μυστικώς εικονίζοντες και τη ζωοποιώ Τριάδι τον τρισάγιον ύμνον προσάδοντες, πάσαν νυν βιοτικήν αποθώμεθα μέριμναν, ως τον βασιλέα των όλων υποδεξόμενοι."
    words:
