      - { el: "πάντοτε,",   tl: "pándote," }
      - { el: "νῦν",        tl: "nin" }
      - { el: "καὶ",        tl: "ke" }
      - { el: "ἀεὶ",        tl: "aí" }
      - { el: "καὶ",        tl: "ke" }
      - { el: "εἰς",        tl: "is" }
