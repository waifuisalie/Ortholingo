      - { el: "ὅλων",          tl: "ólon" }
      - { el: "ὑποδεξόμενοι.", tl: "ipodexómeni." }
    pt: "Nós que misticamente representamos os querubins e cantamos à Trindade vivificante o hino trisságio, deixemos agora de lado toda preocupação mundana, para recebermos o Rei de todos."
    gloss:
      - { el: "μυστικῶς",         pt: "misticamente" }
      - { el: "βιοτικὴν μέριμναν", pt: "preocupação mundana, cuidado da vida" }
      - { el: "ὑποδεξόμενοι",     pt: "prestes a receber (como hóspede)" }
    context_pt: >-
      O Hino Querubínico. Enquanto o coro o canta devagar, o sacerdote prepara
      a Grande Entrada. É um convite a largar tudo — «deixemos toda preocupação
      mundana» — para receber o Rei. Cante com o coro.
    source: "Divina Liturgia (GOA), p. 15"
    tags: [entrada-grande, hino, resposta-do-povo]
    voice: athina
    review: pending

  - id: panton-imon
    kind: phrase
    greek: "Πάντων ὑμῶν μνησθείη Κύριος ὁ Θεὸς ἐν τῇ βασιλείᾳ αὐτοῦ, πάντοτε, νῦν καὶ ἀεὶ καὶ εἰς τοὺς αἰῶνας τῶν αἰώνων."
    tts: "Πάντων υμών μνησθείη Κύριος ο Θεός εν τη βασιλεία αυτού, πάντοτε, νυν και αει και εις τους αιώνας των αιώνων."
    words:
      - { el: "Πάντων",     tl: "Pándon" }
      - { el: "ὑμῶν",       tl: "imón" }
