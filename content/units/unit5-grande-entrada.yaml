      - { el: "τῶν",        tl: "ton" }
      - { el: "αἰώνων.",    tl: "eónon." }
    pt: "A todos vós recorde o Senhor Deus no seu reino, sempre, agora e sempre e pelos séculos dos séculos."
    gloss:
      - { el: "μνησθείη", pt: "recorde, lembre-se de (optativo)" }
      - { el: "βασιλείᾳ", pt: "reino" }
    context_pt: >-
      É isto que o sacerdote (ou o diácono) proclama na Grande Entrada, de pé
      diante do povo com os dons sagrados nas mãos: «que o Senhor vos recorde
      no seu Reino». Por isso muitos se persignam. O povo responde «Ἀμήν».
    source: "Divina Liturgia (GOA), p. 16"
    tags: [entrada-grande, sacerdote, para-reconhecer]
    voice: nestoras
    review: pending

  - id: paraschu-kyrie
    kind: phrase
