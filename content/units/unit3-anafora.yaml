      - { el: "πνεύματός", tl: "pnévmatós" }
      - { el: "σου.", tl: "su." }
    pt: "E com o teu espírito."
    gloss:
      - { el: "μετὰ + genitivo", pt: "com — repare: aqui é «μετὰ τοῦ», não «τῷ»" }
    context_pt: >-
      Quase igual à resposta que você já sabe («Καὶ τῷ πνεύματί σου») —
      mas na Anáfora a forma muda: «Καὶ μετὰ τοῦ πνεύματός σου».
    source: "Divina Liturgia (GOA), p. 20"
    tags: [anafora, resposta-do-povo]
    voice: athina
    review: pending

  - id: anafora-ano
    kind: phrase
    greek: "Ἄνω σχῶμεν τὰς καρδίας."
    tts: "Άνω σχώμεν τας καρδίας."
    words:
      - { el: "Ἄνω", tl: "Áno" }
