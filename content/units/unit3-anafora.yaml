      - { el: "τὰς", tl: "tas" }
      - { el: "καρδίας.", tl: "kardías." }
    pt: "Elevemos os corações."
    gloss:
      - { el: "ἄνω", pt: "para o alto" }
      - { el: "καρδίας", pt: "corações — cardiologia vem daqui" }
    context_pt: >-
      O «sursum corda» das liturgias de todo o mundo cristão — aqui na
      língua em que foi primeiro dito.
    source: "Divina Liturgia (GOA), p. 20"
    tags: [anafora, sacerdote, para-reconhecer]
    voice: nestoras
    review: pending

  - id: anafora-echomen
    kind: phrase
    greek: "Ἔχομεν πρὸς τὸν Κύριον."
    tts: "Έχομεν προς τον Κύριον."
