      - { el: "τὸν", tl: "ton" }
      - { el: "Κύριον.", tl: "Kírion." }
    pt: "Já os temos junto ao Senhor."
    gloss:
      - { el: "ἔχομεν", pt: "temos (o coração já está lá)" }
    context_pt: >-
      A resposta mais ousada da Liturgia: não «vamos elevar», mas «já os
      temos junto ao Senhor».
    source: "Divina Liturgia (GOA), p. 20"
    tags: [anafora, resposta-do-povo]
    voice: athina
