unit:
  id: unit3-anafora
  title: "A Anáfora · o diálogo sagrado"
  section: nave
  order: 5
  intro_pt: >-
    O coração da Liturgia. Aqui você aprende os dois lados do diálogo: o que
    o sacerdote e o diácono proclamam (voz masculina) e o que o povo — você —
    responde (voz feminina). Ouvir é metade da participação.

items:
  - id: anafora-stomen
    kind: phrase
    greek: "Στῶμεν καλῶς· στῶμεν μετὰ φόβου· πρόσχωμεν τὴν ἁγίαν ἀναφορὰν ἐν εἰρήνῃ προσφέρειν."
    tts: "Στώμεν καλώς. Στώμεν μετά φόβου. Πρόσχωμεν την αγίαν αναφοράν εν ειρήνη προσφέρειν."
    words:
      - { el: "Στῶμεν", tl: "Stómen" }
      - { el: "καλῶς·", tl: "kalós;" }
      - { el: "στῶμεν", tl: "stómen" }
      - { el: "μετὰ", tl: "metá" }
      - { el: "φόβου·", tl: "fóvu;" }
      - { el: "πρόσχωμεν", tl: "próschomen" }
      - { el: "τὴν", tl: "tin" }
      - { el: "ἁγίαν", tl: "ayían" }
      - { el: "ἀναφορὰν", tl: "anaforán" }
      - { el: "ἐν", tl: "en" }
      - { el: "εἰρήνῃ", tl: "iríni" }
      - { el: "προσφέρειν.", tl: "prosférin." }
    pt: "Estejamos de pé, com reverência; estejamos com temor; atentos, para oferecer em paz a santa oblação."
    gloss:
      - { el: "στῶμεν", pt: "estejamos de pé" }
      - { el: "ἀναφοράν", pt: "anáfora — a oferenda elevada (ana + phéro)" }
    context_pt: >-
      O chamado do diácono que abre a Anáfora: tudo o que vem agora pede o
      nosso corpo de pé e o coração desperto.
    source: "Divina Liturgia (GOA), p. 20"
    tags: [anafora, diacono, para-reconhecer]
    voice: nestoras
    review: pending

  - id: anafora-eleon
    kind: phrase
    greek: "Ἔλεον εἰρήνης, θυσίαν αἰνέσεως."
    tts: "Έλεον ειρήνης, θυσίαν αινέσεως."
    words:
      - { el: "Ἔλεον", tl: "Éleon" }
      - { el: "εἰρήνης,", tl: "irínis," }
      - { el: "θυσίαν", tl: "thisían" }
      - { el: "αἰνέσεως.", tl: "enéseos." }
    pt: "Misericórdia de paz, sacrifício de louvor."
    gloss:
      - { el: "ἔλεον", pt: "misericórdia — a raiz de «ἐλέησον»" }
      - { el: "θυσίαν αἰνέσεως", pt: "sacrifício de louvor (Sl 49)" }
    context_pt: >-
      A resposta do povo ao chamado do diácono: o que trazemos ao altar é
      louvor.
    source: "Divina Liturgia (GOA), p. 20"
    tags: [anafora, resposta-do-povo]
    voice: athina
    review: pending

  - id: anafora-haris
