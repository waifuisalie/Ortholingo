  - id: anafora-ta-sa
    kind: phrase
    greek: "Τὰ σὰ ἐκ τῶν σῶν σοὶ προσφέρομεν κατὰ πάντα καὶ διὰ πάντα."
    tts: "Τα σα εκ των σων σοι προσφέρομεν κατά πάντα και διά πάντα."
