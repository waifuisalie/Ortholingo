    pt: "A graça de nosso Senhor Jesus Cristo, e o amor de Deus Pai, e a comunhão do Espírito Santo estejam com todos vós."
    gloss:
      - { el: "χάρις", pt: "graça" }
      - { el: "ἀγάπη", pt: "amor" }
      - { el: "κοινωνία", pt: "comunhão" }
    context_pt: >-
      A bênção trinitária — são as palavras de S. Paulo em 2Co 13:13,
      ditas pelo sacerdote voltado para o povo.
    source: "Divina Liturgia (GOA), p. 20"
    tags: [anafora, sacerdote, para-reconhecer]
    voice: nestoras
    review: pending

  - id: anafora-ke-meta
    kind: phrase
    greek: "Καὶ μετὰ τοῦ πνεύματός σου."
    tts: "Και μετά του πνεύματός σου."
    words:
      - { el: "Καὶ", tl: "Ke" }
      - { el: "μετὰ", tl: "metá" }
