    context_pt: >-
      A palavra que dá nome ao mistério: Eucaristia significa ação de
      graças. (E o «obrigado» grego de hoje: «ευχαριστώ».)
    source: "Divina Liturgia (GOA), p. 20"
    tags: [anafora, sacerdote, para-reconhecer]
    voice: nestoras
    review: pending

