      - { el: "ἡμᾶς", tl: "imás" }
      - { el: "ἔσωσεν.", tl: "ésosen." }
    pt: "Vimos a luz verdadeira, recebemos o Espírito celestial, encontramos a fé verdadeira, adorando a Trindade indivisível: pois ela nos salvou."
    gloss:
      - { el: "Εἴδομεν τὸ φῶς", pt: "vimos a luz — o hino de depois da Comunhão" }
