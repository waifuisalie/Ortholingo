      - { el: "κληρονομίαν", tl: "klironomían" }
      - { el: "σου.", tl: "su." }
    pt: "Salva, ó Deus, o teu povo e abençoa a tua herança."
    gloss:
      - { el: "λαόν", pt: "povo — laós, como «leigo»" }
      - { el: "κληρονομίαν", pt: "herança" }
    context_pt: >-
      Do Salmo 27, dito pelo sacerdote após a Comunhão, abençoando o povo.
    source: "Divina Liturgia (GOA), p. 30"
    tags: [comunhao, sacerdote, para-reconhecer]
    voice: nestoras
    review: pending

  - id: idomen
    kind: phrase
    greek: "Εἴδομεν τὸ φῶς τὸ ἀληθινόν, ἐλάβομεν Πνεῦμα ἐπουράνιον, εὕρομεν πίστιν ἀληθῆ, ἀδιαίρετον Τριάδα προσκυνοῦντες· αὕτη γὰρ ἡμᾶς ἔσωσεν."
    tts: "Είδομεν το φως το αληθινόν, ελάβομεν Πνεύμα επουράνιον, εύρομεν πίστιν αληθή, αδιαίρετον Τριάδα προσκυνούντες. Αύτη γαρ ημάς έσωσεν."
