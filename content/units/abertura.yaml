      - { el: "ἁγίων",            tl: "ayíon" }
      - { el: "μνημονεύσαντες,",  tl: "mnimonéfsandes," }
      - { el: "ἑαυτοὺς",          tl: "eaftús" }
      - { el: "καὶ",              tl: "ke" }
      - { el: "ἀλλήλους",         tl: "allílus" }
      - { el: "καὶ",              tl: "ke" }
      - { el: "πᾶσαν",            tl: "pásan" }
      - { el: "τὴν",              tl: "tin" }
      - { el: "ζωὴν",             tl: "zoín" }
      - { el: "ἡμῶν",             tl: "imón" }
      - { el: "Χριστῷ",           tl: "Christó" }
      - { el: "τῷ",               tl: "to" }
      - { el: "Θεῷ",              tl: "Theó" }
      - { el: "παραθώμεθα.",      tl: "parathómetha." }
    pt: "Recordando a nossa toda-santa, imaculada, sobremaneira bendita e gloriosa Senhora, a Theotókos e sempre-virgem Maria, com todos os santos, entreguemo-nos a nós mesmos, uns aos outros, e toda a nossa vida a Cristo, nosso Deus."
    gloss:
      - { el: "μνημονεύσαντες", pt: "tendo recordado (dos santos)" }
      - { el: "ἀειπαρθένου",    pt: "sempre-virgem (ἀεί + παρθένος)" }
      - { el: "παραθώμεθα",     pt: "entreguemo-nos, confiemos" }
    context_pt: >-
      A conclusão que o diácono dá a cada litania — longa, mas você a ouvirá
      muitas vezes. Termina pedindo que entreguemos tudo a Cristo; e o povo
      responde com o «Σοί, Κύριε» que você já sabe.
    source: "Divina Liturgia (GOA), p. 17"
    tags: [liturgia, litania, diacono, para-reconhecer]
    voice: nestoras
    review: pending

  - id: si-kyrie
    kind: phrase
    greek: "Σοί, Κύριε."
    tts: "Σοι, Κύριε."
    words:
      - { el: "Σοί,",    tl: "Si," }
      - { el: "Κύριε.",  tl: "Kírie." }
    pt: "A Ti, Senhor."
    gloss:
      - { el: "σοί",   pt: "a ti (dativo)" }
      - { el: "Κύριε", pt: "Senhor" }
    context_pt: >-
      Resposta do povo quando o diácono conclui «…entreguemos toda a nossa
      vida a Cristo Deus»: entregamos «a Ti, Senhor».
    source: "Divina Liturgia de S. João Crisóstomo"
    tags: [liturgia, litania, resposta-do-povo]
    voice: athina
    review: pending
