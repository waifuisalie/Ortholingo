      - { el: "ἡμῶν",             tl: "imón" }
      - { el: "Θεοτόκου",         tl: "Theotóku" }
      - { el: "καὶ",              tl: "ke" }
      - { el: "ἀειπαρθένου",      tl: "aiparthénu" }
      - { el: "Μαρίας",           tl: "Marías" }
      - { el: "μετὰ",             tl: "metá" }
      - { el: "πάντων",           tl: "pándon" }
