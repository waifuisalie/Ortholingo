      - { el: "τὰς", tl: "tas" }
      - { el: "Γραφάς.", tl: "Grafás." }
    pt: "Ressuscitou ao terceiro dia, conforme as Escrituras."
    gloss:
      - { el: "ἀναστάντα", pt: "ressuscitou — a mesma raiz de «Ἀνέστη» da Páscoa" }
