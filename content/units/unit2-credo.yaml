      - { el: "ἀληθινοῦ,", tl: "alithinú," }
      - { el: "γεννηθέντα", tl: "yennithénda" }
      - { el: "οὐ", tl: "u" }
      - { el: "ποιηθέντα,", tl: "piithénda," }
      - { el: "ὁμοούσιον", tl: "omoúsion" }
      - { el: "τῷ", tl: "to" }
      - { el: "Πατρί,", tl: "Patrí," }
      - { el: "δι'", tl: "di" }
      - { el: "οὗ", tl: "u" }
      - { el: "τὰ", tl: "ta" }
      - { el: "πάντα", tl: "pánda" }
      - { el: "ἐγένετο.", tl: "eyéneto." }
    pt: "Luz da Luz, Deus verdadeiro do Deus verdadeiro, gerado não criado, consubstancial ao Pai, por ele todas as coisas foram feitas."
    gloss:
      - { el: "ὁμοούσιον", pt: "consubstancial — da MESMA essência; a palavra que decidiu Niceia" }
      - { el: "γεννηθέντα οὐ ποιηθέντα", pt: "gerado, não criado" }
    context_pt: >-
      «Ὁμοούσιον» é a palavra mais disputada da história da Igreja — uma
      letra a separava da heresia (ὁμοιούσιον, «semelhante»).
    source: "Devocional, p. 7; Divina Liturgia (GOA)"
    tags: [credo, povo]
    voice: athina
    review: pending

  - id: credo-4
    kind: phrase
    greek: "Τὸν δι' ἡμᾶς τοὺς ἀνθρώπους καὶ διὰ τὴν ἡμετέραν σωτηρίαν κατελθόντα ἐκ τῶν οὐρανῶν καὶ σαρκωθέντα ἐκ Πνεύματος ἁγίου καὶ Μαρίας τῆς Παρθένου καὶ ἐνανθρωπήσαντα."
    tts: "Τον δι' ημάς τους ανθρώπους και διά την ημετέραν σωτηρίαν κατελθόντα εκ των ουρανών και σαρκωθέντα εκ Πνεύματος αγίου και Μαρίας της Παρθένου και ενανθρωπήσαντα."
