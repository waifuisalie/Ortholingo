      - { el: "ταφέντα.", tl: "tafénda." }
    pt: "E por nós foi crucificado sob Pôncio Pilatos; padeceu e foi sepultado."
    gloss:
      - { el: "Σταυρωθέντα", pt: "crucificado — de σταυρός, cruz" }
      - { el: "ὑπὲρ ἡμῶν", pt: "por nós, em nosso favor" }
    context_pt: >-
      O único nome humano do Credo além de Maria: Pilatos — a fé ancorada
      na história.
    source: "Devocional, p. 7; Divina Liturgia (GOA)"
    tags: [credo, povo]
    voice: athina
    review: pending

  - id: credo-6
