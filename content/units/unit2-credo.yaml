      - { el: "ἐνανθρωπήσαντα.", tl: "enanthropísanda." }
    pt: "E, por nós, homens, e para a nossa salvação, desceu dos Céus e se encarnou pelo Espírito Santo, no seio da Virgem Maria, e se fez homem."
    gloss:
      - { el: "σωτηρίαν", pt: "salvação (soteriologia vem daqui)" }
      - { el: "σαρκωθέντα", pt: "encarnado — fez-se carne (σάρξ)" }
      - { el: "ἐνανθρωπήσαντα", pt: "fez-se homem — en + ánthropos" }
    context_pt: >-
      Neste artigo, na tradição, inclinamos a cabeça — é a Encarnação.
    source: "Devocional, p. 7; Divina Liturgia (GOA)"
    tags: [credo, povo]
    voice: athina
    review: pending

  - id: credo-5
    kind: phrase
    greek: "Σταυρωθέντα τε ὑπὲρ ἡμῶν ἐπὶ Ποντίου Πιλάτου καὶ παθόντα καὶ ταφέντα."
    tts: "Σταυρωθέντα τε υπέρ ημών επί Ποντίου Πιλάτου και παθόντα και ταφέντα."
    words:
      - { el: "Σταυρωθέντα", tl: "Stavrothénda" }
