unit:
  id: unit2-credo
  title: "O Credo · Σύμβολον τῆς Πίστεως"
  section: nave
  order: 3
  intro_pt: >-
    O Símbolo da Fé — a profissão de fé de Niceia-Constantinopla, dita por
    TODO o povo, de pé, a cada Liturgia. Aprendemos artigo por artigo, na
    ordem em que você o rezará. Traduções conforme o Devocional.

items:
  - id: credo-1
    kind: phrase
    greek: "Πιστεύω εἰς ἕνα Θεόν, Πατέρα Παντοκράτορα, ποιητὴν οὐρανοῦ καὶ γῆς, ὁρατῶν τε πάντων καὶ ἀοράτων."
    tts: "Πιστεύω εις ένα Θεόν, Πατέρα Παντοκράτορα, ποιητήν ουρανού και γης, ορατών τε πάντων και αοράτων."
    words:
      - { el: "Πιστεύω", tl: "Pistévo" }
      - { el: "εἰς", tl: "is" }
      - { el: "ἕνα", tl: "éna" }
      - { el: "Θεόν,", tl: "Theón," }
      - { el: "Πατέρα", tl: "Patéra" }
      - { el: "Παντοκράτορα,", tl: "Pandokrátora," }
      - { el: "ποιητὴν", tl: "piitín" }
      - { el: "οὐρανοῦ", tl: "uranú" }
      - { el: "καὶ", tl: "ke" }
      - { el: "γῆς,", tl: "yis," }
      - { el: "ὁρατῶν", tl: "oratón" }
      - { el: "τε", tl: "te" }
      - { el: "πάντων", tl: "pándon" }
      - { el: "καὶ", tl: "ke" }
      - { el: "ἀοράτων.", tl: "aoráton." }
    pt: "Creio em um só Deus, Pai onipotente, Criador do Céu e da terra, de todas as coisas visíveis e invisíveis."
    gloss:
      - { el: "Πιστεύω", pt: "creio (a primeira palavra: fé pessoal)" }
      - { el: "Παντοκράτορα", pt: "Pantocrator — que tudo governa" }
      - { el: "ὁρατῶν / ἀοράτων", pt: "visíveis / invisíveis" }
    context_pt: >-
      A palavra que abre o Credo, «Πιστεύω» — «creio» — é a mesma dos ícones
      do Pantocrator no teto das igrejas.
    source: "Devocional, p. 7; Divina Liturgia (GOA)"
    tags: [credo, povo]
    voice: athina
    review: pending

  - id: credo-2
    kind: phrase
    greek: "Καὶ εἰς ἕνα Κύριον Ἰησοῦν Χριστόν, τὸν υἱὸν τοῦ Θεοῦ τὸν μονογενῆ, τὸν ἐκ τοῦ Πατρὸς γεννηθέντα πρὸ πάντων τῶν αἰώνων·"
    tts: "Και εις ένα Κύριον Ιησούν Χριστόν, τον υιόν του Θεού τον μονογενή, τον εκ του Πατρός γεννηθέντα προ πάντων των αιώνων."
    words:
      - { el: "Καὶ", tl: "Ke" }
      - { el: "εἰς", tl: "is" }
      - { el: "ἕνα", tl: "éna" }
      - { el: "Κύριον", tl: "Kírion" }
      - { el: "Ἰησοῦν", tl: "Iisún" }
