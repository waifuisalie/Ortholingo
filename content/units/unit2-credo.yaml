      - { el: "τὸν", tl: "ton" }
      - { el: "υἱὸν", tl: "ión" }
      - { el: "τοῦ", tl: "tu" }
      - { el: "Θεοῦ", tl: "Theú" }
      - { el: "τὸν", tl: "ton" }
      - { el: "μονογενῆ,", tl: "monoyení," }
      - { el: "τὸν", tl: "ton" }
      - { el: "ἐκ", tl: "ek" }
      - { el: "τοῦ", tl: "tu" }
      - { el: "Πατρὸς", tl: "Patrós" }
      - { el: "γεννηθέντα", tl: "yennithénda" }
      - { el: "πρὸ", tl: "pro" }
      - { el: "πάντων", tl: "pándon" }
      - { el: "τῶν", tl: "ton" }
      - { el: "αἰώνων·", tl: "eónon." }
    pt: "E em um só Senhor, Jesus Cristo, Filho unigênito de Deus, nascido do Pai antes de todos os séculos."
    gloss:
      - { el: "μονογενῆ", pt: "unigênito — único gerado" }
      - { el: "πρὸ πάντων τῶν αἰώνων", pt: "antes de todos os séculos" }
    context_pt: >-
      «Μονογενής» é a palavra de João 3:16 — o Filho único.
    source: "Devocional, p. 7; Divina Liturgia (GOA)"
    tags: [credo, povo]
    voice: athina
    review: pending

  - id: credo-3
    kind: phrase
    greek: "Φῶς ἐκ φωτός, Θεὸν ἀληθινὸν ἐκ Θεοῦ ἀληθινοῦ, γεννηθέντα οὐ ποιηθέντα, ὁμοούσιον τῷ Πατρί, δι' οὗ τὰ πάντα ἐγένετο."
    tts: "Φως εκ φωτός, Θεόν αληθινόν εκ Θεού αληθινού, γεννηθέντα ου ποιηθέντα, ομοούσιον τω Πατρί, δι' ου τα πάντα εγένετο."
    words:
