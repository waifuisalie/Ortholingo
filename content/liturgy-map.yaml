# The Liturgy Map: the order of the Divine Liturgy of St. John Chrysostom,
# with every teachable phrase placed where it lives and weighted by roughly
# how many times it is said/sung in one typical Sunday Liturgy.
# Chunked prayers (Credo, Pai Nosso) use fractional weights so the whole
# prayer sums to its real liturgical weight.
#
# `ref` must exist in the corpus, OR carry `future: true` with labels.
# Weights are estimates pending clergy review (like all content).

liturgy:
  title_pt: "Divina Liturgia de S. João Crisóstomo"

sections:
  - id: enarxis
    title_pt: "Grande Litania"
    items:
      - { ref: kyrie-eleison, weight: 12 }
      - { ref: amin, weight: 10 }
      - { ref: tis-panagias, weight: 4 }
      - { ref: si-kyrie, weight: 3 }
      - { ref: paraschu-kyrie, weight: 6 }

  - id: antifonas
    title_pt: "Antífonas e Pequena Entrada"
    items:
      - { ref: doxa-patri, weight: 2 }
      - { ref: ke-nin, weight: 2 }
      - { ref: sofia-orthi, weight: 1 }

  - id: trisagio
    title_pt: "O Trisságio"
    items:
      - { ref: trisagion, weight: 3 }

  - id: leituras
    title_pt: "Leituras e Evangelho"
    items:
      - { ref: irini-pasi, weight: 2 }
      - { ref: ke-to-pnevmati-su, weight: 4 }
      - { ref: proschomen, weight: 3 }
      - { ref: doxa-si-kyrie, weight: 2 }

  - id: entrada-grande
    title_pt: "A Grande Entrada"
    items:
      - { ref: cherubikon, weight: 1 }
      - { ref: panton-imon, weight: 1 }

  - id: credo
    title_pt: "O Credo"
    items:
      - { ref: credo-1, weight: 0.2 }
      - { ref: credo-2, weight: 0.2 }
      - { ref: credo-3, weight: 0.2 }
      - { ref: credo-4, weight: 0.2 }
      - { ref: credo-5, weight: 0.2 }
      - { ref: credo-6, weight: 0.2 }
      - { ref: credo-7, weight: 0.2 }
      - { ref: credo-8, weight: 0.2 }
      - { ref: credo-9, weight: 0.2 }
      - { ref: credo-10, weight: 0.2 }
      - { ref: credo-11, weight: 0.2 }
      - { ref: credo-12, weight: 0.2 }

  - id: anafora
    title_pt: "A Anáfora"
    items:
      - { ref: anafora-stomen, weight: 1 }
      - { ref: anafora-eleon, weight: 1 }
      - { ref: anafora-haris, weight: 1 }
      - { ref: anafora-ke-meta, weight: 1 }
      - { ref: anafora-ano, weight: 1 }
      - { ref: anafora-echomen, weight: 1 }
      - { ref: anafora-efcharistisomen, weight: 1 }
      - { ref: anafora-axion, weight: 1 }
      - { ref: anafora-agios, weight: 1 }
      - { ref: anafora-lavete, weight: 1 }
      - { ref: anafora-piete, weight: 1 }
      - { ref: anafora-ta-sa, weight: 1 }
      - { ref: anafora-se-ymnoumen, weight: 1 }
      - { ref: anafora-exeretos, weight: 1 }
      - { ref: anafora-axion-estin, weight: 1 }

  - id: pai-nosso
    title_pt: "Pai Nosso e Comunhão"
    items:
      - { ref: pater-1, weight: 0.4 }
      - { ref: pater-2, weight: 0.4 }
      - { ref: pater-3, weight: 0.4 }
      - { ref: pater-4, weight: 0.4 }
      - { ref: pater-5, weight: 0.4 }
      - { ref: pater-doxologia, weight: 1 }
      - { ref: ta-agia, weight: 1 }
      - { ref: is-agios, weight: 1 }
      - { ref: meta-fovou, weight: 1 }
      - { ref: soson-o-theos, weight: 1 }
      - { ref: idomen, weight: 1 }

  - id: despedida
    title_pt: "Bênção final e Despedida"
    items:
      - { ref: ii-to-onoma, weight: 3 }
